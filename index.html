<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kid Learn App</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
    }

    .card {
      background: rgba(255, 255, 255, 0.08);
      padding: 40px;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
      max-width: 500px;
      backdrop-filter: blur(10px);
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 10px;
    }

    p {
      opacity: 0.85;
      line-height: 1.5;
    }

    .btn {
      margin-top: 20px;
      display: inline-block;
      padding: 12px 20px;
      background: #3b82f6;
      color: white;
      text-decoration: none;
      border-radius: 10px;
      transition: 0.3s;
    }

    .btn:hover {
      background: #2563eb;
      transform: scale(1.05);
    }

    .badge {
      margin-top: 15px;
      font-size: 12px;
      opacity: 0.6;
    }
  </style>
</head>

<body>
  <div class="card">
    <div style="margin-top: 30px; padding-top: 15px; border-top: 1px solid rgba(255,255,255,0.15); display: flex; justify-content: center; gap: 25px; font-size: 14px;">
  
  <a href="privacy.html" style="color: #cbd5e1; text-decoration: none;">
    Privacy
  </a>

  <a href="support.html" style="color: #cbd5e1; text-decoration: none;">
    Support
  </a>

</div>
    <h1>🚀 Kid Learn</h1>
    <p>
      A simple learnign app for kids to do some basic reading and math.<br />
          </p>

   


  </div>
</body>
</html>
